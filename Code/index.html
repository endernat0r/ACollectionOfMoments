<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link href="styles.css" rel="stylesheet">
  <script defer src="game.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Gotham+Rounded:wght@400;700&display=swap" rel="stylesheet">
  <title>Text Adventure</title>
</head>
<body> 
  <div id="magic-overlay"></div>
  <div id="snow-container"></div>
  <h1 id="title" class="title">A Collection of Moments</h1>
  <div id="whack-a-mole-game" class="whack-a-mole">
    <div class="game-info">
      <div id="score">Score: 0</div>
      <div id="timer">Time: 30s</div>
    </div>
    <div class="game-container">
      <div class="hole" id="hole1"></div>
      <div class="hole" id="hole2"></div>
      <div class="hole" id="hole3"></div>
      <div class="hole" id="hole4"></div>
      <div class="hole" id="hole5"></div>
      <div class="hole" id="hole6"></div>
      <div class="hole" id="hole7"></div>
      <div class="hole" id="hole8"></div>
      <div class="hole" id="hole9"></div>
    </div>
  </div>
  <div id="slider-screen">
    <h2 id="slider-text">Starting the intro</h2>
    <div class="slidecontainer">
      <input type="range" min="1" max="100" value="1" class="slider" id="myRange">
    </div>
    <button class="btn" style="margin-top: 40px;" onclick="endSlider()">Finish Workshop</button>
  </div>
  <div id="cps-minigame-wrapper" style="display: none;">    
    <div id="cps-content">
      Timer: <span id="cps-timer">0.000</span><br/>
      Score: <span id="cps-score">0</span><br/>
      Clicks/s: <span id="cps-cps">0.00</span>
    </div>
    
    <div id="cps-clickarea">
      <button id="cps-start">Start</button>
    </div>
  </div>
  <div class="container">
    <div id="text">Text</div>
    <div id="option-buttons" class="btn-grid">
      <button class="btn">Option 1</button>
      <button class="btn">Option 2</button>
      <button class="btn">Option 3</button>
      <button class="btn">Option 4</button>
    </div>
  </div>
  <audio id="myTrack">
    <source src="EndaminYeter.mp3" type="audio/mpeg">
  </audio>
  <button id="musicButton" class="playButton">🎵</button>
</body>
</html>
